<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <p>Tic Tac Toe</p>
        <button class="new-game">New+</button>
      </div>

      <div class="main">
        <div class="names">
          <input type="text" id="p1" value="" />
          <input type="text" id="p2" value="" />
        </div>
        <div class="tiles">
          <p id="t0"></p>
          <p id="t1"></p>
          <p id="t2"></p>

          <p id="t3"></p>
          <p id="t4"></p>
          <p id="t5"></p>

          <p id="t6"></p>
          <p id="t7"></p>
          <p id="t8"></p>
        </div>

        <p class="notif"></p>
      </div>
    </div>
  </body>
</html>
